name: OnDeviceLLM
options:
  bundleIdPrefix: com.ondevicellm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  llama:
    url: https://github.com/ggml-org/llama.cpp
    from: 0.1.0

targets:
  OnDeviceLLM:
    type: application
    platform: iOS
    sources:
      - path: OnDeviceLLM/OnDeviceLLM
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: NeonChat
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.ondevicellm.neonchat
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1
    dependencies: []
    info:
      path: OnDeviceLLM/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "NeonChat uses the camera for multimodal AI features"
        NSPhotoLibraryUsageDescription: "NeonChat accesses photos for multimodal AI features"
